apiVersion: backstage.io/v1alpha1
kind: Component

metadata:
  name: ${{values.app_name}}
  description: Multi-language service ${{values.app_name}}

  annotations:
    github.com/project-slug: Backstage-GoldenImage/${{values.app_name}}
    backstage.io/techdocs-ref: dir:.

    jenkins.io/job-full-name: ${{values.app_name}}
    argocd/app-name: ${{values.app_name}}

    backstage.io/kubernetes-id: ${{values.app_name}}
    backstage.io/kubernetes-namespace: default

spec:
  type: service
  owner: development
  lifecycle: experimental
